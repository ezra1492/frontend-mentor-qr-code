<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="./styles.css" />
    <!-- Connects this HTML file to the external CSS stylesheet for styling -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Imports the "Outfit" font from Google Fonts using regular (400) and bold (700) weights -->

    <title>Frontend Mentor | QR code component</title>
  </head>
  <body>
    <!-- Central content container for the QR component -->
    <main>
      <article class="qr-code">
        <!-- article: main section -->
        <img
          class="qr-code__img"
          src="./images/image-qr-code.png"
          alt="QR code to visit Frontend Mentor"
        />
        <h1 class="qr-code__title">
          Improve your front-end skills by building projects
        </h1>
        <p class="qr-code__description">
          Scan the QR code to visit Frontend Mentor and take your coding skills
          to the next level
        </p>
      </article>
    </main>

    <footer class="attribution">
      <!-- Section for the project credits -->
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        rel="noopener noreferrer"
        target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a
        href="https://github.com/ezra1492"
        rel="noopener noreferrer"
        target="_blank"
        >Israel (Ray) Guevara</a
      >.
      <!-- target="_blank" opens links in a new tab. rel="noopener noreferrer" is a security best practice that protects the original page -->
    </footer>
  </body>
</html>
