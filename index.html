<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="./styles.css" />
    <!-- conencts the HTML document to the CSS stylesheet -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- font: it chooses the font weight values 400 and 700 -->

    <title>Frontend Mentor | QR code component</title>
  </head>
  <body>
    <!-- main: this is what the web site is about, its purpose -->
    <main>
      <article>
        <!-- article: main section -->
        <img
          src="./images/image-qr-code.png"
          alt="QR code to visit Frontend Mentor"
        />
        <h1>Improve your front-end skills by building projects</h1>
        <p>
          Scan the QR code to visit Frontend Mentor and take your coding skills
          to the next level
        </p>
      </article>
    </main>

    <footer class="attribution">
      <!-- credits -->
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by
      <a href="https://github.com/ezra1492" target="_blank"
        >Israel (Ray) Guevara</a
      >.
      <!-- adding target="_blank" to open the link in a new window -->
    </footer>
  </body>
</html>
